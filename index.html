<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PushUp Tracker</title>
    <style>
        :root {
            --main-green: #39ff14;
            --daily-blue: #00f3ff;
            --lap-color: #ffffff; /* Färgen för varv 2 (när du passerar målet) */
            --dark-bg: #121212;
            --darker-bg: #0a0a0a;
        }
        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .header {
            color: var(--main-green);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .circle-outer {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: conic-gradient(var(--main-green) 0%, #333 0%);
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.15);
            transition: background 0.3s ease;
        }
        .circle-inner {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: conic-gradient(var(--daily-blue) 0%, var(--darker-bg) 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }
        .circle-mask {
            width: 150px;
            height: 150px;
            background-color: var(--dark-bg);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .total-count {
            font-size: 36px;
            font-weight: bold;
            margin: 0;
        }
        .goal-count {
            color: #888;
            font-size: 12px;
        }
        .stats-grid {
            display: flex;
            justify-content: space-between;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            text-align: center;
            flex: 1;
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .daily-indicator { color: var(--daily-blue); }

        .fire-status {
            color: #ff4500;
            font-weight: bold;
            font-size: 14px;
            display: none; 
            margin-top: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .pushup-btn {
            background-color: #2a2a2a;
            color: var(--main-green);
            border: 2px solid var(--main-green);
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .pushup-btn:active {
            background-color: var(--main-green);
            color: var(--dark-bg);
            transform: scale(0.98);
        }

        .custom-container {
            display: flex;
            gap: 10px;
        }
        .custom-btn-main {
            flex-grow: 1; 
            border-color: var(--daily-blue);
            color: var(--daily-blue);
        }
        .custom-btn-main:active {
            background-color: var(--daily-blue);
            color: var(--dark-bg);
        }
        .custom-settings-icon {
            width: 50px;
            font-size: 20px;
            border-color: var(--daily-blue);
            color: var(--daily-blue);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">PushUp Pro</div>
        
        <div class="circle-outer" id="outerCircle">
            <div class="circle-inner" id="innerCircle">
                <div class="circle-mask">
                    <p class="total-count" id="currentTotal">0</p>
                    <p class="goal-count">TOTALT / 10k</p>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label"><span class="daily-indicator" id="lapIndicator">●</span> Dagens Mål</div>
                <div class="stat-value" id="dailyProgressText">0 / 322</div>
                <div class="fire-status" id="fireStatus">🔥 ON FIRE!</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Dagar Kvar</div>
                <div class="stat-value">31</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="pushup-btn" onclick="addPushups(10)">+ 10</button>
            <button class="pushup-btn" onclick="addPushups(15)">+ 15</button>
            <button class="pushup-btn" onclick="addPushups(20)">+ 20</button>
            
            <div class="custom-container">
                <button class="pushup-btn custom-btn-main" id="customBtn" onclick="addCustom()">+ Custom</button>
                <button class="pushup-btn custom-settings-icon" onclick="setCustomAmount()">🖌️</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. HÄMTA DATA FRÅN MINNET (ELLER BÖRJA PÅ 0) ---
        let totalPushups = parseInt(localStorage.getItem('totalPushups')) || 0;
        let dailyPushupsDone = parseInt(localStorage.getItem('dailyPushupsDone')) || 0;
        let customAmount = parseInt(localStorage.getItem('customAmount')) || 0;
        
        const totalGoal = 10000;
        const dailyGoal = 322; 

        // --- 2. UPPDATERA SKÄRMEN DIREKT NÄR APPEN STARTAR ---
        function updateScreen() {
            document.getElementById('currentTotal').innerText = totalPushups;
            document.getElementById('dailyProgressText').innerText = `${dailyPushupsDone} / ${dailyGoal}`;
            
            if (customAmount > 0) {
                document.getElementById('customBtn').innerText = "+ " + customAmount;
            }

            // Yttre ringen
            let totalPercentage = (totalPushups / totalGoal) * 100;
            if (totalPercentage > 100) totalPercentage = 100;
            document.getElementById('outerCircle').style.background = `conic-gradient(var(--main-green) ${totalPercentage}%, #333 0%)`;

            // Inre ringen (Apple Activity Style)
            let dailyPercentage = (dailyPushupsDone / dailyGoal) * 100;
            let laps = Math.floor(dailyPercentage / 100); // Hur många hela varv har vi snurrat?
            let currentLapPercentage = dailyPercentage % 100; // Hur många procent är vi på i det aktuella varvet?

            if (laps === 0) {
                // Första varvet: Vanlig blå färg
                document.getElementById('innerCircle').style.background = `conic-gradient(var(--daily-blue) ${currentLapPercentage}%, var(--darker-bg) 0%)`;
                document.getElementById('lapIndicator').style.color = 'var(--daily-blue)';
            } else {
                // Andra varvet (eller fler): Vit ring ritas OVANPÅ den blåa!
                document.getElementById('innerCircle').style.background = `conic-gradient(var(--lap-color) ${currentLapPercentage}%, var(--daily-blue) 0%)`;
                document.getElementById('lapIndicator').style.color = 'var(--lap-color)'; // Ändra den lilla pricken till vit också
            }

            // Fire-status
            if(dailyPushupsDone >= dailyGoal) {
                document.getElementById('fireStatus').style.display = 'block';
            } else {
                document.getElementById('fireStatus').style.display = 'none';
            }
        }

        // --- 3. LÄGG TILL OCH SPARA I MINNET ---
        function addPushups(amount) {
            totalPushups += amount;
            dailyPushupsDone += amount; 

            // Spara i Local Storage
            localStorage.setItem('totalPushups', totalPushups);
            localStorage.setItem('dailyPushupsDone', dailyPushupsDone);

            updateScreen();
        }

        function setCustomAmount() {
            let input = prompt("Välj antal för Custom-knappen:", customAmount > 0 ? customAmount : "30");
            let parsedNumber = parseInt(input);
            
            if (!isNaN(parsedNumber) && parsedNumber > 0) {
                customAmount = parsedNumber;
                localStorage.setItem('customAmount', customAmount); // Spara valet
                updateScreen();
            }
        }

        function addCustom() {
            if (customAmount === 0) {
                setCustomAmount();
            } else {
                addPushups(customAmount);
            }
        }

        // Kör funktionen en gång när sidan laddas för att rita upp allt
        updateScreen();
    </script>

</body>
</html>
