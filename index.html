<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PushUp Tracker</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .header {
            color: #39ff14;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .progress-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(#39ff14 0%, #333 0%);
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
            transition: background 0.3s ease;
        }
        .progress-inner {
            width: 170px;
            height: 170px;
            background-color: #121212;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .total-count {
            font-size: 40px;
            font-weight: bold;
            margin: 0;
        }
        .goal-count {
            color: #888;
            font-size: 14px;
        }
        .stats-grid {
            display: flex;
            justify-content: space-between;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .fire-status {
            color: #ff4500;
            font-weight: bold;
            display: none;
            margin-top: 5px;
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            background-color: #2a2a2a;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active {
            background-color: #39ff14;
            color: #121212;
        }
        .custom-btn {
            border-color: #00f3ff;
            color: #00f3ff;
        }
        .custom-btn:active {
            background-color: #00f3ff;
            color: #121212;
        }
        .edit-custom {
            color: #00f3ff;
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">PushUp Pro</div>
        
        <div class="progress-circle" id="progressCircle">
            <div class="progress-inner">
                <p class="total-count" id="currentTotal">0</p>
                <p class="goal-count">/ 10 000</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">DAGENS SNITT</div>
                <div class="stat-value">322</div>
                <div class="fire-status" id="fireStatus">🔥 ON FIRE!</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">DAGAR KVAR</div>
                <div class="stat-value">31</div>
            </div>
        </div>

        <div class="action-buttons">
            <button onclick="addPushups(10)">+ 10</button>
            <button onclick="addPushups(15)">+ 15</button>
            <button onclick="addPushups(20)">+ 20</button>
            <button class="custom-btn" id="customBtn" onclick="addCustom()">+ Custom</button>
        </div>
        
        <div class="edit-custom" onclick="setCustomAmount()">Ändra Custom-värde ⚙️</div>
    </div>

    <script>
        let totalPushups = 0;
        let customAmount = 0; 
        const goal = 10000;
        const dailyGoal = 322; 

        function addPushups(amount) {
            totalPushups += amount;
            document.getElementById('currentTotal').innerText = totalPushups;
            
            let percentage = (totalPushups / goal) * 100;
            if (percentage > 100) percentage = 100; 
            document.getElementById('progressCircle').style.background = `conic-gradient(#39ff14 ${percentage}%, #333 0%)`;

            if(totalPushups >= dailyGoal) {
                document.getElementById('fireStatus').style.display = 'block';
            }
        }

        function setCustomAmount() {
            let input = prompt("Hur många armhävningar vill du att Custom-knappen ska lägga till?", "25");
            let parsedNumber = parseInt(input);
            
            if (!isNaN(parsedNumber) && parsedNumber > 0) {
                customAmount = parsedNumber;
                document.getElementById('customBtn').innerText = "+ " + customAmount;
            }
        }

        function addCustom() {
            if (customAmount === 0) {
                setCustomAmount();
            } else {
                addPushups(customAmount);
            }
        }
    </script>

</body>
</html>
