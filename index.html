<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PushUp Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root { --main-green: #39ff14; --daily-blue: #00f3ff; --lap-color: #ffffff; --dark-bg: #121212; --darker-bg: #0a0a0a; --panel-bg: #1e1e1e; }
        body { background-color: var(--dark-bg); color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Ikon-stil */
        .icon { vertical-align: middle; font-size: 20px; }
        
        /* Header & Login */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-title { color: var(--main-green); font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .icon-btn { font-size: 28px; cursor: pointer; background: none; border: none; color: #888; padding: 0; transition: color 0.2s; }
        .icon-btn:hover { color: #fff; }
        
        .card { background-color: var(--panel-bg); padding: 25px; border-radius: 20px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card h2 { margin-top: 0; color: #fff; display: flex; align-items: center; gap: 10px; }
        .card label { display: block; margin-bottom: 8px; color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #333; background-color: var(--darker-bg); color: white; font-size: 16px; box-sizing: border-box; outline: none; transition: border 0.2s; }
        .input-field:focus { border-color: var(--main-green); }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.6; }
        
        .primary-btn { width: 100%; background-color: var(--main-green); color: var(--dark-bg); border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.1s; }
        .primary-btn:active { transform: scale(0.98); }
        .danger-btn { width: 100%; background: rgba(255, 69, 0, 0.1); color: #ff4500; border: 1px solid rgba(255, 69, 0, 0.3); padding: 15px; font-size: 14px; border-radius: 12px; cursor: pointer; margin-top: 15px; font-weight: bold; display: flex; justify-content: center; gap: 8px; }
        
        /* Dashboard & Nya SVG Ringarna */
        .dashboard-content { text-align: center; }
        .ring-container { position: relative; width: 240px; height: 240px; margin: 0 auto 30px auto; display: flex; align-items: center; justify-content: center; }
        .ring-svg { transform: rotate(-90deg); position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; }
        .ring-track { fill: none; stroke: #222; }
        .ring-progress { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease; filter: drop-shadow(0px 0px 8px rgba(0,0,0,0.5)); }
        .ring-content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--dark-bg); width: 140px; height: 140px; border-radius: 50%; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        
        .total-count { font-size: 38px; font-weight: bold; margin: 0; text-shadow: 0 2px 10px rgba(57, 255, 20, 0.3); }
        .goal-count { color: #888; font-size: 11px; letter-spacing: 1px; }
        
        .stats-grid { display: flex; justify-content: space-between; background-color: var(--panel-bg); padding: 20px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .stat-box { text-align: center; flex: 1; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .stat-value { font-size: 20px; font-weight: bold; color: #fff; }
        .daily-indicator { color: var(--daily-blue); font-size: 14px; }
        .fire-status { color: #ff4500; font-weight: bold; font-size: 12px; display: none; margin-top: 5px; animation: pulse 1.5s infinite; display: flex; align-items: center; justify-content: center; gap: 4px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .pushup-btn { background-color: #2a2a2a; color: var(--main-green); border: 2px solid rgba(57, 255, 20, 0.3); padding: 18px; font-size: 20px; font-weight: bold; border-radius: 16px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .pushup-btn:active { background-color: var(--main-green); color: var(--dark-bg); transform: scale(0.95); }
        .custom-container { display: flex; gap: 8px; }
        .custom-btn-main { flex-grow: 1; border-color: rgba(0, 243, 255, 0.3); color: var(--daily-blue); }
        .custom-btn-main:active { background-color: var(--daily-blue); color: var(--dark-bg); }
        .custom-settings-btn { width: 55px; border-color: rgba(0, 243, 255, 0.3); color: var(--daily-blue); display: flex; align-items: center; justify-content: center; padding: 0; border-radius: 16px; background-color: #2a2a2a; cursor: pointer; }
        
        /* Ny design för Ångra-knappen */
        .undo-btn { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #aaa; padding: 12px; font-size: 14px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .undo-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .undo-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="app-container">
        
        <div id="loginScreen" class="screen">
            <div class="header-bar" style="justify-content: center; margin-top: 40px;">
                <h1 class="header-title">PushUp Pro</h1>
            </div>
            <div class="card">
                <h2><span class="material-symbols-outlined icon">login</span> Welcome</h2>
                <label>Choose a Username:</label>
                <input type="text" id="inputUsername" class="input-field" placeholder="e.g. IronChest99" autocomplete="off">
                <button class="primary-btn" onclick="loginUser()">
                    <span class="material-symbols-outlined icon">arrow_forward</span> Enter App
                </button>
            </div>
        </div>

        <div class="header-bar" id="mainHeader" style="display:none;">
            <h1 class="header-title" id="greetingTitle">PushUp Pro</h1>
            <button class="icon-btn" onclick="showSetupScreen()">
                <span class="material-symbols-outlined">settings</span>
            </button>
        </div>

        <div id="setupScreen" class="screen">
            <div class="card">
                <h2><span class="material-symbols-outlined icon">flag</span> Your Challenge</h2>
                <label>Total Goal (Amount):</label>
                <input type="number" id="inputTotalGoal" class="input-field" placeholder="e.g. 10000">
                <label>Start Date:</label>
                <input type="date" id="inputStartDate" class="input-field">
                <label>End Date:</label>
                <input type="date" id="inputEndDate" class="input-field">
                
                <button class="primary-btn" onclick="saveSettings()">
                    <span class="material-symbols-outlined icon">rocket_launch</span> Save & Start
                </button>
                <button class="danger-btn" onclick="resetAllData()">
                    <span class="material-symbols-outlined icon">warning</span> Reset All Progress
                </button>
            </div>
        </div>

        <div id="dashboardScreen" class="screen dashboard-content">
            
            <div class="ring-container">
                <svg class="ring-svg" viewBox="0 0 240 240">
                    <circle class="ring-track" cx="120" cy="120" r="105" stroke-width="14"/>
                    <circle id="svgOuter" class="ring-progress" cx="120" cy="120" r="105" stroke="var(--main-green)" stroke-width="14" stroke-dasharray="659.7" stroke-dashoffset="659.7"/>
                    
                    <circle id="svgInnerTrack" class="ring-track" cx="120" cy="120" r="85" stroke-width="14"/>
                    <circle id="svgInner" class="ring-progress" cx="120" cy="120" r="85" stroke="var(--daily-blue)" stroke-width="14" stroke-dasharray="534" stroke-dashoffset="534"/>
                </svg>
                
                <div class="ring-content">
                    <p class="total-count" id="currentTotal">0</p>
                    <p class="goal-count" id="goalText">TOTAL / 0</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">
                        <span class="material-symbols-outlined daily-indicator" id="lapIndicator">radio_button_checked</span> Daily Goal
                    </div>
                    <div class="stat-value" id="dailyProgressText">0 / 0</div>
                    <div class="fire-status" id="fireStatus">
                        <span class="material-symbols-outlined icon">local_fire_department</span> ON FIRE!
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">
                        <span class="material-symbols-outlined icon" style="font-size:14px;">calendar_today</span> Days Left
                    </div>
                    <div class="stat-value" id="daysLeftText">0</div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="pushup-btn" onclick="addPushups(10)">+ 10</button>
                <button class="pushup-btn" onclick="addPushups(15)">+ 15</button>
                <button class="pushup-btn" onclick="addPushups(20)">+ 20</button>
                <div class="custom-container">
                    <button class="pushup-btn custom-btn-main" id="customBtn" onclick="addCustom()">+ Custom</button>
                    <button class="custom-settings-btn" onclick="setCustomAmount()">
                        <span class="material-symbols-outlined icon">edit</span>
                    </button>
                </div>
            </div>
            
            <button class="undo-btn" onclick="undoLastAction()">
                <span class="material-symbols-outlined icon">undo</span> Undo Last Action
            </button>
        </div>

    </div>

    <script>
        // DATA
        let username = localStorage.getItem('username');
        let totalPushups = parseInt(localStorage.getItem('totalPushups')) || 0;
        let dailyPushupsDone = parseInt(localStorage.getItem('dailyPushupsDone')) || 0;
        let customAmount = parseInt(localStorage.getItem('customAmount')) || 0;
        let actionHistory = JSON.parse(localStorage.getItem('actionHistory')) || []; 
        let savedTotalGoal = parseInt(localStorage.getItem('totalGoal'));
        let savedStartDate = localStorage.getItem('startDate');
        let savedEndDate = localStorage.getItem('endDate');
        let calculatedDailyGoal = 0, calculatedDaysLeft = 0;

        // SVG Cirkel-matematik
        const outerCircumference = 659.7; // 2 * pi * 105
        const innerCircumference = 534;   // 2 * pi * 85

        function hideAllScreens() {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
        }

        // LOGIN LOGIK
        function checkAppStart() {
            if (!username) {
                hideAllScreens();
                document.getElementById('loginScreen').classList.add('active-screen');
                document.getElementById('mainHeader').style.display = 'none';
            } else {
                document.getElementById('mainHeader').style.display = 'flex';
                document.getElementById('greetingTitle').innerText = username + "'s Pro";
                checkOnboarding();
            }
        }

        function loginUser() {
            let inputName = document.getElementById('inputUsername').value.trim();
            if(inputName === "") { alert("Please enter a username!"); return; }
            username = inputName;
            localStorage.setItem('username', username);
            checkAppStart();
        }

        // ÖVRIG LOGIK (Som tidigare)
        function checkAndResetNewDay() {
            let todayString = new Date().toDateString();
            let lastLoginDate = localStorage.getItem('lastLoginDate');
            if (lastLoginDate !== todayString) {
                dailyPushupsDone = 0; localStorage.setItem('dailyPushupsDone', 0);
                localStorage.setItem('lastLoginDate', todayString);
                actionHistory = []; localStorage.setItem('actionHistory', JSON.stringify(actionHistory));
            }
        }

        function checkOnboarding() {
            if (!savedTotalGoal || !savedStartDate || !savedEndDate) { showSetupScreen(); } 
            else { checkAndResetNewDay(); calculateDatesAndGoals(); showDashboard(); }
        }

        function showSetupScreen() {
            hideAllScreens(); document.getElementById('setupScreen').classList.add('active-screen');
            if(savedTotalGoal) document.getElementById('inputTotalGoal').value = savedTotalGoal;
            if(savedStartDate) document.getElementById('inputStartDate').value = savedStartDate;
            if(savedEndDate) document.getElementById('inputEndDate').value = savedEndDate;
        }

        function showDashboard() {
            hideAllScreens(); document.getElementById('dashboardScreen').classList.add('active-screen');
            // Anropa updateScreen med en liten fördröjning så att SVG-animationen triggas snyggt
            setTimeout(updateScreen, 50); 
        }

        function saveSettings() {
            let g = document.getElementById('inputTotalGoal').value, s = document.getElementById('inputStartDate').value, e = document.getElementById('inputEndDate').value;
            if(!g || !s || !e) { alert("Please fill in all fields!"); return; }
            savedTotalGoal = parseInt(g); savedStartDate = s; savedEndDate = e;
            localStorage.setItem('totalGoal', savedTotalGoal); localStorage.setItem('startDate', savedStartDate); localStorage.setItem('endDate', savedEndDate);
            checkAndResetNewDay(); calculateDatesAndGoals(); showDashboard();
        }

        function resetAllData() {
            if(confirm("Are you sure? This deletes everything!")) { localStorage.clear(); location.reload(); }
        }

        function calculateDatesAndGoals() {
            const start = new Date(savedStartDate), end = new Date(savedEndDate), today = new Date();
            start.setHours(0,0,0,0); end.setHours(0,0,0,0); today.setHours(0,0,0,0);
            const totalDays = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
            calculatedDaysLeft = Math.round((end - today) / (1000 * 60 * 60 * 24));
            if (calculatedDaysLeft < 0) calculatedDaysLeft = 0;
            calculatedDailyGoal = totalDays > 0 ? Math.ceil(savedTotalGoal / totalDays) : savedTotalGoal; 
        }

        function updateScreen() {
            document.getElementById('currentTotal').innerText = totalPushups;
            document.getElementById('goalText').innerText = `TOTAL / ${savedTotalGoal ? savedTotalGoal.toLocaleString('en-US') : 0}`;
            document.getElementById('dailyProgressText').innerText = `${dailyPushupsDone} / ${calculatedDailyGoal}`;
            document.getElementById('daysLeftText').innerText = calculatedDaysLeft;
            if (customAmount > 0) document.getElementById('customBtn').innerText = "+ " + customAmount;

            // Animerad Yttre Ring (Grön)
            let totalPercentage = savedTotalGoal ? (totalPushups / savedTotalGoal) : 0;
            if (totalPercentage > 1) totalPercentage = 1;
            document.getElementById('svgOuter').style.strokeDashoffset = outerCircumference - (totalPercentage * outerCircumference);

            // Animerad Inre Ring (Blå / Vit) - Apple Style
            let dailyPercentage = calculatedDailyGoal > 0 ? (dailyPushupsDone / calculatedDailyGoal) : 0;
            let laps = Math.floor(dailyPercentage);
            let currentLapPercentage = dailyPercentage % 1; // Decimalen, t.ex. 0.45 för 45% av nuvarande varv
            
            let innerOffset = innerCircumference - (currentLapPercentage * innerCircumference);

            if (laps === 0) {
                document.getElementById('svgInnerTrack').setAttribute('stroke', '#222');
                document.getElementById('svgInner').setAttribute('stroke', 'var(--daily-blue)');
                document.getElementById('lapIndicator').style.color = 'var(--daily-blue)';
            } else {
                // Har vi varvat, blir spåret under blått, och progressen blir vit!
                document.getElementById('svgInnerTrack').setAttribute('stroke', 'var(--daily-blue)');
                document.getElementById('svgInner').setAttribute('stroke', 'var(--lap-color)');
                document.getElementById('lapIndicator').style.color = 'var(--lap-color)';
            }
            document.getElementById('svgInner').style.strokeDashoffset = innerOffset;

            // Fire status
            let isFire = (dailyPushupsDone >= calculatedDailyGoal && calculatedDailyGoal > 0);
            document.getElementById('fireStatus').style.display = isFire ? 'flex' : 'none';
        }

        function addPushups(amount) {
            checkAndResetNewDay(); 
            totalPushups += amount; dailyPushupsDone += amount; 
            actionHistory.push(amount); localStorage.setItem('actionHistory', JSON.stringify(actionHistory));
            localStorage.setItem('totalPushups', totalPushups); localStorage.setItem('dailyPushupsDone', dailyPushupsDone);
            updateScreen();
        }

        function undoLastAction() {
            if (actionHistory.length === 0) { alert("Nothing to undo!"); return; }
            let lastAmount = actionHistory.pop(); 
            totalPushups -= lastAmount; dailyPushupsDone -= lastAmount;
            if (totalPushups < 0) totalPushups = 0; if (dailyPushupsDone < 0) dailyPushupsDone = 0;
            localStorage.setItem('totalPushups', totalPushups); localStorage.setItem('dailyPushupsDone', dailyPushupsDone); localStorage.setItem('actionHistory', JSON.stringify(actionHistory));
            updateScreen();
        }

        function setCustomAmount() {
            let input = prompt("Choose amount for Custom button:", customAmount > 0 ? customAmount : "30");
            let parsedNumber = parseInt(input);
            if (!isNaN(parsedNumber) && parsedNumber > 0) { customAmount = parsedNumber; localStorage.setItem('customAmount', customAmount); updateScreen(); }
        }
