<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pushup Days</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main-green: #39ff14; --daily-red: #ff1144; --lap-color: #ffaa00; --dark-bg: #121212; --panel-bg: #1e1e1e; --c1: #00f3ff; --c2: #bf00ff; --c3: #ccff00; }
        body { background-color: var(--dark-bg); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; overflow-x: hidden;}
        .app-container { width: 100%; max-width: 400px; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active-screen { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* BILD-STYLER */
        .app-logo { width: 120px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(57, 255, 20, 0.3)); }
        
        /* Eld-bilden bakom ringen */
        .fire-image-bg { position: absolute; top: -30px; left: -30px; width: 300px; height: 300px; z-index: 0; opacity: 0; transition: opacity 0.8s ease; pointer-events: none; }
        .fire-image-bg.active { opacity: 0.7; animation: breatheFire 3s infinite ease-in-out; }
        @keyframes breatheFire { 0%, 100% { transform: scale(1); filter: brightness(1) blur(2px); } 50% { transform: scale(1.08); filter: brightness(1.4) blur(0px); } }

        /* Header & Knappar */
        .header-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .header-title { color: var(--main-green); font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin: 0; cursor: pointer; }
        .header-icons { display: flex; gap: 12px; }
        .icon-btn { font-size: 26px; cursor: pointer; background: none; border: none; color: #888; padding: 0; transition: 0.2s; }
        .icon-btn:hover { color: #fff; }
        
        .card { background-color: var(--panel-bg); padding: 20px; border-radius: 20px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;}
        .input-field { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background-color: #0a0a0a; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        .primary-btn { width: 100%; background-color: var(--main-green); color: var(--dark-bg); border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        
        /* Dashboard Ringen */
        .dashboard-content { text-align: center; }
        .ring-container { position: relative; width: 240px; height: 240px; margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center; }
        .ring-svg { transform: rotate(-90deg); position: absolute; width: 100%; height: 100%; z-index: 5; overflow: visible; }
        .ring-track { fill: none; stroke: #222; }
        .ring-progress { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .ring-content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--dark-bg); width: 140px; height: 140px; border-radius: 50%; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        
        .total-count { font-size: 38px; font-weight: bold; margin: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background-color: var(--panel-bg); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 16px; font-weight: bold; }
        
        .fire-status { color: #ffaa00; font-weight: bold; font-size: 12px; display: none; margin-top: 5px; animation: pulse 1s infinite; justify-content: center; gap: 4px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .pushup-btn { background-color: #2a2a2a; color: var(--main-green); border: 2px solid rgba(57, 255, 20, 0.3); padding: 15px; font-size: 18px; font-weight: bold; border-radius: 14px; cursor: pointer; transition: 0.1s; }
        .custom-container { display: flex; gap: 6px; }
        .custom-settings-btn { width: 50px; border-radius: 14px; background-color: #2a2a2a; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); color: #888; display: flex; align-items: center; justify-content: center; }
        
        .color-1 { color: var(--c1); border-color: rgba(0, 243, 255, 0.3); }
        .color-2 { color: var(--c2); border-color: rgba(191, 0, 255, 0.3); }
        .color-3 { color: var(--c3); border-color: rgba(204, 255, 0, 0.3); }

        /* CELEBRATION OVERLAY MED DIN BILD */
        .celebration-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .celeb-image { width: 250px; height: auto; margin-bottom: 20px; animation: popScale 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.28); }
        @keyframes popScale { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* ÖVRIGT (Leaderboard/Kalender förenklat) */
        .lb-item { display: flex; align-items: center; background: #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-cell { background: #2a2a2a; border-radius: 6px; padding: 6px; text-align: center; min-height: 40px; }
    </style>
</head>
<body>
    
    <div id="celebrationOverlay" class="celebration-overlay">
        <img src="Celebration.png" alt="Celebration" class="celeb-image">
        <h1 style="color:var(--main-green); letter-spacing:3px;">GOAL REACHED!</h1>
        <p style="color: #888;">You are unstoppable.</p>
    </div>

    <div class="app-container">
        
        <div id="loginScreen" class="screen">
            <div style="text-align: center; margin-top: 40px;">
                <img src="Logo.png" alt="Pushup Days Logo" class="app-logo">
                <h1 class="header-title" style="margin-bottom:30px;">Pushup Days</h1>
            </div>
            <div class="card">
                <label>Username</label>
                <input type="text" id="inputUsername" class="input-field" placeholder="Athlete Name">
                <label>Password</label>
                <input type="password" id="inputPassword" class="input-field" placeholder="****">
                <button class="primary-btn" onclick="loginUser()">LOGIN</button>
            </div>
        </div>

        <div class="header-bar" id="mainHeader" style="display:none;">
            <div onclick="showDashboard()" style="cursor:pointer">
                <h1 class="header-title">Pushup Days</h1>
                <div class="header-subtitle" id="greetingTitle">User</div>
            </div>
            <div class="header-icons">
                <button class="icon-btn" onclick="showDashboard()"><span class="material-symbols-outlined">home</span></button>
                <button class="icon-btn" onclick="showLeaderboardScreen()"><span class="material-symbols-outlined">emoji_events</span></button>
                <button class="icon-btn" onclick="showCalendarScreen()"><span class="material-symbols-outlined">calendar_month</span></button>
                <button class="icon-btn" onclick="showSetupScreen()"><span class="material-symbols-outlined">settings</span></button>
            </div>
        </div>

        <div id="dashboardScreen" class="screen dashboard-content">
            <div class="ring-container">
                <img src="Fire.png" alt="Fire" id="fireImg" class="fire-image-bg">
                
                <svg class="ring-svg" viewBox="0 0 240 240">
                    <circle class="ring-track" cx="120" cy="120" r="105" stroke-width="12"/>
                    <circle id="svgOuter" class="ring-progress" cx="120" cy="120" r="105" stroke="var(--main-green)" stroke-width="12" stroke-dasharray="659.7" stroke-dashoffset="659.7"/>
                    <circle id="svgInnerTrack" class="ring-track" cx="120" cy="120" r="85" stroke-width="12"/>
                    <circle id="svgInnerFull" cx="120" cy="120" r="85" stroke="var(--daily-red)" stroke-width="12" fill="none" style="opacity: 0;" />
                    <circle id="svgInner" class="ring-progress" cx="120" cy="120" r="85" stroke="var(--daily-red)" stroke-width="12" stroke-dasharray="534" stroke-dashoffset="534"/>
                </svg>
                <div class="ring-content">
                    <p class="total-count" id="centerLargeText">0</p>
                    <p class="goal-count" id="centerSmallText">TOTAL: 0 / 0</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">Daily Avg</div><div class="stat-value" id="dailyAvgText">0</div></div>
                <div class="stat-box"><div class="stat-label">Goal</div><div class="stat-value" id="dailyProgressText">0 / 0</div></div>
                <div class="stat-box"><div class="stat-label">Left</div><div class="stat-value" id="daysLeftText">0</div></div>
            </div>
            
            <div class="fire-status" id="fireStatus"><span class="material-symbols-outlined">local_fire_department</span> ON FIRE!</div>

            <div class="action-buttons" style="margin-top: 20px;">
                <button class="pushup-btn" onclick="addPushups(10)">+ 10</button>
                <button class="pushup-btn" onclick="addPushups(15)">+ 15</button>
                <button class="pushup-btn" onclick="addPushups(20)">+ 20</button>
                <div class="custom-container"><button class="pushup-btn color-1" id="customBtn0" style="flex-grow:1" onclick="addCustom(0)">+ C1</button><button class="custom-settings-btn" onclick="setCustomAmount(0)"><span class="material-symbols-outlined">edit</span></button></div>
                <div class="custom-container"><button class="pushup-btn color-2" id="customBtn1" style="flex-grow:1" onclick="addCustom(1)">+ C2</button><button class="custom-settings-btn" onclick="setCustomAmount(1)"><span class="material-symbols-outlined">edit</span></button></div>
                <div class="custom-container"><button class="pushup-btn color-3" id="customBtn2" style="flex-grow:1" onclick="addCustom(2)">+ C3</button><button class="custom-settings-btn" onclick="setCustomAmount(2)"><span class="material-symbols-outlined">edit</span></button></div>
            </div>
            <button class="icon-btn" onclick="undoLastAction()" style="font-size:14px; text-decoration:underline;">Undo Action</button>
        </div>

        <div id="leaderboardScreen" class="screen"><div class="card"><h2>🏆 Toplist</h2><div class="lb-item">@PushupKing - 12k</div><div class="lb-item">@SaraFit - 8k</div><button class="primary-btn" onclick="showDashboard()">Back</button></div></div>
        <div id="calendarScreen" class="screen"><div class="card"><h2>📅 Calendar</h2><div id="calendarGrid" class="calendar-grid"></div><button class="primary-btn" onclick="showDashboard()" style="margin-top:20px;">Back</button></div></div>
        <div id="setupScreen" class="screen"><div class="card"><h2>⚙️ Settings</h2><input type="number" id="inputDailyGoal" class="input-field" placeholder="Daily Goal"><button class="primary-btn" onclick="saveSettings()">Save</button><button class="danger-btn" onclick="logOutUser()">Logout</button></div></div>

    </div>

    <script>
        let localUsername = localStorage.getItem('username') || "";
        let totalPushups = parseInt(localStorage.getItem('totalPushups')) || 0;
        let dailyPushupsDone = parseInt(localStorage.getItem('dailyPushupsDone')) || 0;
        let customAmounts = JSON.parse(localStorage.getItem('customAmounts')) || [25, 30, 50];
        let pushupLog = JSON.parse(localStorage.getItem('pushupLog')) || [];
        let dailyGoal = parseInt(localStorage.getItem('dailyGoalSetting')) || 50;

        function hideAllScreens() { document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen')); }

        function checkAppStart() {
            if (!localUsername) { hideAllScreens(); document.getElementById('loginScreen').classList.add('active-screen'); }
            else { 
                document.getElementById('mainHeader').style.display = 'flex';
                document.getElementById('greetingTitle').innerText = "@" + localUsername;
                showDashboard(); 
            }
        }

        function loginUser() {
            let u = document.getElementById('inputUsername').value.trim();
            if(!u) return;
            localStorage.setItem('username', u); localUsername = u;
            checkAppStart();
        }

        function showDashboard() { hideAllScreens(); document.getElementById('dashboardScreen').classList.add('active-screen'); updateUI(); }
        function showLeaderboardScreen() { hideAllScreens(); document.getElementById('leaderboardScreen').classList.add('active-screen'); }
        function showCalendarScreen() { hideAllScreens(); document.getElementById('calendarScreen').classList.add('active-screen'); renderCalendar(); }
        function showSetupScreen() { hideAllScreens(); document.getElementById('setupScreen').classList.add('active-screen'); }

        function addPushups(amount) {
            totalPushups += amount; dailyPushupsDone += amount;
            pushupLog.push({ amount, timestamp: Date.now() });
            saveData();
            updateUI();
            if (dailyPushupsDone >= dailyGoal && (dailyPushupsDone - amount) < dailyGoal) { triggerCelebration(); }
        }

        function triggerCelebration() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#39ff14', '#ffffff', '#ff1144'] });
            let overlay = document.getElementById('celebrationOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 4000);
        }

        function updateUI() {
            document.getElementById('centerLargeText').innerText = dailyPushupsDone;
            document.getElementById('centerSmallText').innerText = `TOTAL: ${totalPushups}`;
            document.getElementById('dailyProgressText').innerText = `${dailyPushupsDone} / ${dailyGoal}`;
            
            for (let i = 0; i < 3; i++) { document.getElementById('customBtn'+i).innerText = "+" + customAmounts[i]; }

            // Ringar
            let dailyPct = Math.min(dailyPushupsDone / dailyGoal, 1);
            document.getElementById('svgInner').style.strokeDashoffset = 534 - (dailyPct * 534);
            document.getElementById('svgOuter').style.strokeDashoffset = 659.7 - (Math.min(totalPushups/10000, 1) * 659.7);

            // On Fire bild och status
            if (dailyPushupsDone >= dailyGoal) {
                document.getElementById('fireImg').classList.add('active');
                document.getElementById('fireStatus').style.display = 'flex';
            } else {
                document.getElementById('fireImg').classList.remove('active');
                document.getElementById('fireStatus').style.display = 'none';
            }
        }

        function saveData() {
            localStorage.setItem('totalPushups', totalPushups);
            localStorage.setItem('dailyPushupsDone', dailyPushupsDone);
            localStorage.setItem('pushupLog', JSON.stringify(pushupLog));
        }

        function logOutUser() { localStorage.clear(); location.reload(); }
        
        // Enkel kalender-renderare
        function renderCalendar() {
            let grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";
            for(let i=1; i<=30; i++) {
                grid.innerHTML += `<div class="calendar-cell"><div style="font-size:10px">${i}</div></div>`;
            }
        }

        window.onload = checkAppStart;
    </script>
</body>
</html>
