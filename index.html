<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PushUp Tracker</title>
    <style>
        /* CSS - Designen och färgerna */
        body {
            background-color: #121212; /* Mörk bakgrund */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 400px; /* Perfekt mobilbredd */
            text-align: center;
        }
        .header {
            color: #39ff14; /* Neongrön */
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .progress-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 10px solid #333;
            border-top-color: #39ff14; /* Neongrön indikator */
            margin: 0 auto 30px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }
        .total-count {
            font-size: 40px;
            font-weight: bold;
            margin: 0;
        }
        .goal-count {
            color: #888;
            font-size: 14px;
        }
        .stats-grid {
            display: flex;
            justify-content: space-between;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .fire-status {
            color: #ff4500; /* Eldorange */
            font-weight: bold;
            display: none; /* Dold tills man når dagens mål */
            margin-top: 5px;
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            background-color: #2a2a2a;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active {
            background-color: #39ff14;
            color: #121212;
        }
        .custom-btn {
            border-color: #00f3ff; /* Elektrisk blå för custom */
            color: #00f3ff;
        }
        .custom-btn:active {
            background-color: #00f3ff;
            color: #121212;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">PushUp Pro</div>
        
        <div class="progress-circle">
            <p class="total-count" id="currentTotal">0</p>
            <p class="goal-count">/ 10 000</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">DAGENS SNITT</div>
                <div class="stat-value">322</div>
                <div class="fire-status" id="fireStatus">🔥 ON FIRE!</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">DAGAR KVAR</div>
                <div class="stat-value">31</div>
            </div>
        </div>

        <div class="action-buttons">
            <button onclick="addPushups(10)">+ 10</button>
            <button onclick="addPushups(15)">+ 15</button>
            <button onclick="addPushups(20)">+ 20</button>
            <button class="custom-btn" onclick="addCustom()">+ Custom</button>
        </div>
    </div>

    <script>
        // JavaScript - Appens hjärna
        let totalPushups = 0;
        let customAmount = 25; // Standardvärde för custom-knappen just nu
        const dailyGoal = 322; 

        function addPushups(amount) {
            totalPushups += amount;
            document.getElementById('currentTotal').innerText = totalPushups;
            
            // Kolla om vi är "On Fire"
            if(totalPushups >= dailyGoal) {
                document.getElementById('fireStatus').style.display = 'block';
            }
        }

        function addCustom() {
            // Här kommer vi senare bygga in en snygg ruta där man ändrar antalet.
            // Just nu lägger den till värdet vi satt ovan.
            addPushups(customAmount);
        }
    </script>

</body>
</html>
