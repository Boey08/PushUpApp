<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pushup Days (DEV 1.4)</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --main-green: #39ff14; --daily-red: #ff1144; --lap-color: #ffaa00; --dark-bg: #121212; --darker-bg: #0a0a0a; --panel-bg: #1e1e1e; --c1: #00f3ff; --c2: #bf00ff; --c3: #ccff00; }
        body { background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); color: #ffffff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 15px 20px; display: flex; justify-content: center; overflow-x: hidden; min-height: 100vh;}
        .app-container { width: 100%; max-width: 400px; }
        .screen { display: none; animation: fadeIn 0.3s ease; } .active-screen { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header-title { font-size: 26px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: 1px; background: linear-gradient(135deg, var(--main-green) 20%, var(--c1) 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; filter: drop-shadow(0 0 8px rgba(57,255,20,0.4)); cursor: pointer;}
        .header-icons { display: flex; gap: 12px; }
        .icon-btn { font-size: 26px; cursor: pointer; background: none; border: none; color: #888; padding: 0; }
        
        .card { background: var(--panel-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #2a2a2a; text-align: left; }
        .card h2 { margin-top: 0; color: #fff; display: flex; align-items: center; gap: 10px; font-size: 18px; margin-bottom: 20px; }
        
        .input-field { width: 100%; height: 50px; padding: 12px 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: var(--darker-bg); color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .primary-btn { width: 100%; background: var(--main-green); color: var(--dark-bg); border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .danger-btn { width: 100%; background: rgba(255,69,0,.1); color:#ff4500; border:1px solid rgba(255,69,0,.3); padding:12px; font-size:14px; border-radius:12px; cursor:pointer; font-weight:bold; }
        
        /* DASHBOARD COMPACT */
        .user-greeting { font-size: 15px; color: #aaa; margin-bottom: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .ring-container { position: relative; width: 210px; height: 210px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; }
        .ring-svg { transform: rotate(-90deg); position: absolute; width: 100%; height: 100%; z-index: 5; }
        .ring-track { fill: none; stroke: #222; }
        .ring-progress { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }
        .ring-content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--dark-bg); width: 125px; height: 125px; border-radius: 50%; box-shadow: inset 0 0 20px rgba(0,0,0,.8); }
        .total-count { font-size: 34px; font-weight: bold; margin: 0; }
        .goal-count { color: #888; font-size: 10px; margin-top: 4px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: var(--panel-bg); padding: 12px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2a2a2a;}
        .stat-box { text-align: center; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        .stat-value { font-size: 15px; font-weight: bold; }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .pushup-btn { background: #2a2a2a; color: var(--main-green); border: 2px solid rgba(57,255,20,.3); padding: 12px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .custom-settings-btn { width: 45px; border-radius: 12px; background: #2a2a2a; border: 1px solid #444; color: #888; display: flex; align-items: center; justify-content: center; }
        
        .lb-item { display: flex; align-items: center; background: #2a2a2a; padding: 12px 15px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent;}
        .lb-rank { font-size: 18px; font-weight: 900; color: #555; width: 30px; }
        .lb-name { flex-grow: 1; font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 4px; }
        .lb-score { color: var(--main-green); font-weight: 900; font-size: 16px; text-align: right;}
        .lb-highlight { background: rgba(57, 255, 20, 0.1); border: 1px solid var(--main-green); }
        
        .streak-badge { background: rgba(255, 170, 0, 0.1); color: #ffaa00; padding: 2px 6px; border-radius: 6px; font-size: 11px; font-weight: 900; display: flex; align-items: center; gap: 2px; }
        .pr-badge { color: var(--c1); font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 3px; margin-top: 5px; justify-content: center;}

        #loadingOverlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: var(--main-green);}
    </style>
</head>
<body>
    
    <div id="loadingOverlay">DEV Environment 1.4...</div>

    <div class="app-container">
        
        <div id="dashboardScreen" class="screen dashboard-content">
            <div class="user-greeting" id="greetingTitle">@User</div>
            <div id="prDisplay" class="pr-badge"></div> <div class="ring-container" id="ringGlowContainer">
                <svg class="ring-svg" viewBox="0 0 200 200">
                    <circle class="ring-track" cx="100" cy="100" r="90" stroke-width="12"/>
                    <circle id="svgOuter" class="ring-progress" cx="100" cy="100" r="90" stroke="var(--main-green)" stroke-width="12" stroke-dasharray="565.5" stroke-dashoffset="565.5"/>
                    <circle class="ring-track" cx="100" cy="100" r="72" stroke-width="12"/>
                    <circle id="svgInnerFull" cx="100" cy="100" r="72" stroke="var(--daily-red)" stroke-width="12" fill="none" style="opacity:0;" />
                    <circle id="svgInner" class="ring-progress" cx="100" cy="100" r="72" stroke="var(--daily-red)" stroke-width="12" stroke-dasharray="452.4" stroke-dashoffset="452.4"/>
                </svg>
                <div class="ring-content">
                    <p class="total-count" id="centerLargeText">0</p>
                    <p class="goal-count" id="centerSmallText">TOTAL: 0 / 0</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">Daily Avg</div><div class="stat-value" id="dailyAvgText">0</div></div>
                <div class="stat-box"><div class="stat-label">Daily Goal</div><div class="stat-value" id="dailyProgressText">0 / 0</div></div>
                <div class="stat-box"><div class="stat-label">Streak</div><div class="stat-value" id="streakText">0</div></div>
            </div>

            <div class="action-buttons">
                <button class="pushup-btn" onclick="addPushups(10)">+ 10</button>
                <button class="pushup-btn" onclick="addPushups(15)">+ 15</button>
                <div class="custom-container"><button class="pushup-btn custom-btn-main color-1" id="customBtn0" onclick="addCustom(0)">+ C1</button><button class="custom-settings-btn" onclick="setCustomAmount(0)"><span class="material-symbols-outlined">edit</span></button></div>
                <div class="custom-container"><button class="pushup-btn custom-btn-main color-2" id="customBtn1" onclick="addCustom(1)">+ C2</button><button class="custom-settings-btn" onclick="setCustomAmount(1)"><span class="material-symbols-outlined">edit</span></button></div>
            </div>
            <button class="undo-btn" onclick="undoLastAction()"><span class="material-symbols-outlined">undo</span> Undo</button>
        </div>

        <div id="leaderboardScreen" class="screen">
            <div class="card">
                <h2><span class="material-symbols-outlined">star</span> Weekly Top 5</h2>
                <div id="weeklyLeaderboardContainer"></div>
                
                <h2 style="margin-top:25px;"><span class="material-symbols-outlined">public</span> Global Top 5</h2>
                <div id="globalLeaderboardContainer"></div>
                
                <h2 style="margin-top:25px;"><span class="material-symbols-outlined">group</span> Friends</h2>
                <div id="friendsLeaderboardContainer"></div>
            </div>
        </div>

        <div id="loginScreen" class="screen">
            <div class="card" style="text-align:center;">
                <h1 class="header-title">Pushup Days</h1>
                <p style="color:#ffaa00; font-size:12px;">DEV MODE 1.4</p>
                <input type="text" id="inputUsername" class="input-field" placeholder="Username">
                <input type="password" id="inputPassword" class="input-field" placeholder="Password">
                <button class="primary-btn" onclick="loginUser()">Login</button>
            </div>
        </div>

        <div id="friendsScreen" class="screen"><div class="card"><div class="search-box"><input type="text" id="friendSearchInput" class="input-field" onkeyup="liveSearchFriends()"><div id="searchResultArea"></div></div><div id="friendsListContainer"></div></div></div>
        <div id="setupScreen" class="screen"><div class="card"><div class="mode-tabs"><div class="mode-tab" id="tab-challenge" onclick="setSetupMode('challenge')">Challenge</div><div class="mode-tab" id="tab-endless" onclick="setSetupMode('endless')">Endless</div></div><div id="challengeInputs"><input type="number" id="inputTotalGoal" class="input-field"><input type="date" id="inputStartDate" class="input-field"><input type="date" id="inputEndDate" class="input-field"></div><div id="endlessInputs"><input type="number" id="inputDailyGoal" class="input-field"></div><button class="primary-btn" onclick="saveSettings()">Save</button><button class="danger-btn" onclick="logOutUser()">Logout</button></div></div>
        <div id="friendProfileScreen" class="screen"><div class="card"><h2 id="fpName"></h2><div id="fpScore"></div><div id="friendCalendarGrid" class="calendar-grid"></div><button class="danger-btn" onclick="showLeaderboardScreen()">Back</button><button id="removeFriendBtn" class="danger-btn" style="margin-top:10px;">Remove</button></div></div>
        <div id="calendarScreen" class="screen"><div class="card"><div id="calendarGrid" class="calendar-grid"></div></div></div>

    </div>

    <div class="header-bar" id="mainHeader" style="display:none; position: fixed; top: 10px; width: calc(100% - 40px); max-width: 360px; z-index: 100;">
        <div class="header-title" onclick="showDashboard()">PD</div>
        <div class="header-icons">
            <button class="icon-btn" onclick="showDashboard()"><span class="material-symbols-outlined">home</span></button>
            <button class="icon-btn" onclick="showFriendsScreen()"><span class="material-symbols-outlined">group</span></button>
            <button class="icon-btn" onclick="showLeaderboardScreen()"><span class="material-symbols-outlined">emoji_events</span></button>
            <button class="icon-btn" onclick="showSetupScreen()"><span class="material-symbols-outlined">settings</span></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAXHGVi8wIKsOCOocWuugNOPoAl9l1OeB8", authDomain: "pushup-days.firebaseapp.com", projectId: "pushup-days", storageBucket: "pushup-days.firebasestorage.app", messagingSenderId: "500331304476", appId: "1:500331304476:web:2a0bdec8dba913df4131d9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const DB_COLLECTION = "users_dev"; 

        let localUsername = localStorage.getItem('username_dev') || "";
        let localPassword = localStorage.getItem('password_dev') || "";
        let totalPushups = 0, dailyPushupsDone = 0, pushupLog = [], myFriends = [], customAmounts = [25,30,50];
        let appMode = 'challenge', savedTotalGoal = 0, savedDailyGoalSetting = 0, savedStartDate = "", savedEndDate = "";
        let dailyPR = 0, streak = 0;

        // --- HJÄLPFUNKTIONER FÖR TID ---
        function getStartOfWeek() {
            const now = new Date();
            const day = now.getDay() || 7; 
            const start = new Date(now);
            start.setHours(0,0,0,0);
            start.setDate(now.getDate() - day + 1);
            return start.getTime();
        }

        // --- BERÄKNA STREAKS OCH PR ---
        function updateStatsMetadata() {
            // PR
            let totalsByDay = {};
            pushupLog.forEach(l => {
                let d = new Date(l.timestamp).toDateString();
                totalsByDay[d] = (totalsByDay[d] || 0) + l.amount;
            });
            dailyPR = Math.max(0, ...Object.values(totalsByDay));

            // Streak
            let streakCount = 0;
            let checkDate = new Date();
            checkDate.setHours(0,0,0,0);
            
            while(true) {
                let ds = checkDate.toDateString();
                let dayTotal = totalsByDay[ds] || 0;
                let goalToReach = appMode === 'challenge' ? calculatedDailyGoal : savedDailyGoalSetting;
                
                if(dayTotal >= goalToReach && goalToReach > 0) {
                    streakCount++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    // Om det är idag och vi inte nått målet än, bryt inte streaken än
                    if(ds === new Date().toDateString()) {
                        checkDate.setDate(checkDate.getDate() - 1);
                        continue;
                    }
                    break;
                }
            }
            streak = streakCount;
        }

        function saveToCloud() {
            updateStatsMetadata();
            // Beräkna veckans total för leaderboarden
            let startOfWeek = getStartOfWeek();
            let weeklyTotal = pushupLog.filter(l => l.timestamp >= startOfWeek).reduce((sum, l) => sum + l.amount, 0);

            db.collection(DB_COLLECTION).doc(localUsername).set({
                username: localUsername, password: localPassword, totalPushups, dailyPushupsDone,
                pushupLog, friends: myFriends, appMode, dailyGoalSetting: savedDailyGoalSetting,
                totalGoal: savedTotalGoal, startDate: savedStartDate, endDate: savedEndDate,
                dailyPR, streak, weeklyTotal,
                lastLoginDate: new Date().toDateString()
            }, { merge: true });
        }

        async function loginUser() {
            let u = document.getElementById('inputUsername').value.trim(), p = document.getElementById('inputPassword').value.trim();
            localUsername = u; localPassword = p;
            localStorage.setItem('username_dev', u); localStorage.setItem('password_dev', p);
            checkAppStart();
        }

        async function checkAppStart() {
            if (!localUsername) {
                document.getElementById('loadingOverlay').style.display = 'none';
                hideAllScreens(); document.getElementById('loginScreen').classList.add('active-screen');
            } else {
                let doc = await db.collection(DB_COLLECTION).doc(localUsername).get();
                if(doc.exists) {
                    let d = doc.data();
                    totalPushups = d.totalPushups || 0; pushupLog = d.pushupLog || [];
                    myFriends = d.friends || []; appMode = d.appMode || 'challenge';
                    savedTotalGoal = d.totalGoal || 0; savedDailyGoalSetting = d.dailyGoalSetting || 0;
                    savedStartDate = d.startDate || ""; savedEndDate = d.endDate || "";
                    if(localStorage.getItem('lastLoginDate_dev') !== new Date().toDateString()) dailyPushupsDone = 0;
                    else dailyPushupsDone = d.dailyPushupsDone || 0;
                }
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainHeader').style.display = 'flex';
                calculateDatesAndGoals(); showDashboard();
            }
        }

        async function showLeaderboardScreen() {
            hideAllScreens(); document.getElementById('leaderboardScreen').classList.add('active-screen');
            
            // 1. Weekly Top 5
            let weekSnap = await db.collection(DB_COLLECTION).orderBy("weeklyTotal", "desc").limit(5).get();
            renderList(weekSnap, "weeklyLeaderboardContainer");

            // 2. Global Top 5
            let globalSnap = await db.collection(DB_COLLECTION).orderBy("totalPushups", "desc").limit(5).get();
            renderList(globalSnap, "globalLeaderboardContainer");

            // 3. Friends
            let friendPromises = [localUsername, ...myFriends].map(f => db.collection(DB_COLLECTION).doc(f).get());
            let friendDocs = await Promise.all(friendPromises);
            let friendsData = friendDocs.filter(d => d.exists).map(d => d.data()).sort((a,b) => b.totalPushups - a.totalPushups);
            renderRawList(friendsData, "friendsLeaderboardContainer");
        }

        function renderList(snap, containerId) {
            let html = ""; let r = 1;
            snap.forEach(doc => {
                let d = doc.data();
                html += `<div class="lb-item" onclick="openFriendProfile('${d.username}')">
                    <div class="lb-rank">${r++}</div>
                    <div class="lb-name">${d.username} ${d.streak > 1 ? '<span class="streak-badge">🔥'+d.streak+'</span>' : ''}</div>
                    <div class="lb-score">${(snap.query._query.explicitOrderBy[0].field === "weeklyTotal" ? d.weeklyTotal : d.totalPushups).toLocaleString()}</div>
                </div>`;
            });
            document.getElementById(containerId).innerHTML = html;
        }

        function renderRawList(data, containerId) {
            let html = ""; let r = 1;
            data.forEach(d => {
                html += `<div class="lb-item ${d.username === localUsername ? 'lb-highlight' : ''}" onclick="openFriendProfile('${d.username}')">
                    <div class="lb-rank">${r++}</div>
                    <div class="lb-name">${d.username} ${d.streak > 1 ? '<span class="streak-badge">🔥'+d.streak+'</span>' : ''}</div>
                    <div class="lb-score">${d.totalPushups.toLocaleString()}</div>
                </div>`;
            });
            document.getElementById(containerId).innerHTML = html;
        }

        function addPushups(amount) {
            vibrate(30); totalPushups += amount; dailyPushupsDone += amount;
            pushupLog.push({amount, timestamp: Date.now()});
            saveToCloud(); updateScreen();
        }

        function updateScreen() {
            document.getElementById('centerLargeText').innerText = dailyPushupsDone;
            document.getElementById('centerSmallText').innerText = `TOTAL: ${totalPushups.toLocaleString()}`;
            document.getElementById('streakText').innerText = streak;
            document.getElementById('prDisplay').innerHTML = dailyPR > 0 ? `<span class="material-symbols-outlined" style="font-size:14px">workspace_premium</span> Daily PR: ${dailyPR}` : "";
            
            let goal = appMode === 'challenge' ? calculatedDailyGoal : savedDailyGoalSetting;
            document.getElementById('dailyProgressText').innerText = `${dailyPushupsDone} / ${goal || '∞'}`;
            
            // Ring animationer
            let totalPct = savedTotalGoal > 0 ? Math.min(totalPushups/savedTotalGoal, 1) : 1;
            document.getElementById('svgOuter').style.strokeDashoffset = 565.5 - (totalPct * 565.5);
            let dailyPct = goal > 0 ? Math.min(dailyPushupsDone/goal, 1) : 0;
            document.getElementById('svgInner').style.strokeDashoffset = 452.4 - (dailyPct * 452.4);
        }

        // Grundläggande nav och setup (förkortat för rymd)
        function hideAllScreens() { document.querySelectorAll('.screen').forEach(s => s.style.display='none'); }
        function showDashboard() { hideAllScreens(); document.getElementById('dashboardScreen').style.display='block'; updateStatsMetadata(); updateScreen(); }
        function showFriendsScreen() { hideAllScreens(); document.getElementById('friendsScreen').style.display='block'; }
        function showSetupScreen() { hideAllScreens(); document.getElementById('setupScreen').style.display='block'; }
        function calculateDatesAndGoals() {
            if(appMode === 'challenge') {
                let start = new Date(savedStartDate), end = new Date(savedEndDate);
                let totalDays = Math.round((end-start)/86400000)+1;
                calculatedDailyGoal = Math.ceil(savedTotalGoal/totalDays);
            }
        }
        function logOutUser() { localStorage.clear(); location.reload(); }
        window.onload = checkAppStart;
    </script>
</body>
</html>
